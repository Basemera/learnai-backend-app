services:
  api:
    build: .
    container_name: learnai-backend-dev
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./:/app
      - ./uploads:/app/uploads
      - ./data:/app/data
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--log-level", "info"]
  db:
      image: pgvector/pgvector:pg16
      container_name: learnai-postgres
      environment:
        POSTGRES_DB: ${POSTGRES_DB:-learnai}
        POSTGRES_USER: ${POSTGRES_USER:-learnai}
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-learnai}
      # ports:
      #   - "5432:5432"
      volumes:
        - postgres_data:/var/lib/postgresql/data
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
        interval: 5s
        timeout: 5s
        retries: 20

volumes:
  postgres_data: