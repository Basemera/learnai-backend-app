[alembic]
# path to migration scripts, relative to this file
script_location = migrations

# template used to generate migration files
file_template = %%(rev)s_%%(slug)s

# truncate the slug to this length
truncate_slug_length = 40

# timezone to use when rendering the date within the migration file.
timezone = UTC

# do NOT set sqlalchemy.url here – it is read from DATABASE_URL env var in env.py
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
